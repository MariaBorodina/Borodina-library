<label class="realm-select">
  <span class="realm-select__label">{{ label() }}</span>
  <select
    class="realm-select__input"
    [value]="value()"
    (change)="onSelectionChange($event)"
  >
    <option value="">Select a realm</option>
    @for (realm of realms(); track realm.id) {
      <option [value]="realm.id">{{ realm.name }}</option>
    }
  </select>
</label>

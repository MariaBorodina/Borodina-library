<section class="section">
  <div class="section-header">
    <div>
      <h1 class="page-title">My <span>Books</span></h1>
      <p class="section-subtitle">Your saved library, ready whenever you are.</p>
    </div>
  </div>

  @if (loading()) {
    <div class="book-grid" aria-busy="true" aria-label="Loading your library">
      @for (placeholder of [1, 2, 3, 4]; track placeholder) {
        <div class="book-card book-card--skeleton"></div>
      }
    </div>
  } @else if (books().length === 0) {
    <div class="library-empty" role="status">
      <p class="library-empty__message">
        Your library is empty. Start browsing and save books you love!
      </p>
      <a routerLink="/realms" class="btn btn-primary">Browse books</a>
    </div>
  } @else {
    <div class="book-grid">
      @for (book of books(); track book.id) {
        <app-book-card [book]="book" />
      }
    </div>
  }
</section>

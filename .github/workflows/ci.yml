name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Angular build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FictioneersUI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: FictioneersUI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Unit tests
        run: npm test
        env:
          CI: true

  supabase:
    name: Supabase migrations & functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Start Supabase
        run: supabase start -x studio,imgproxy,logflare,vector

      - name: Apply migrations and seed
        run: supabase db reset

      - name: Lint database schema
        run: supabase db lint

      - name: Type-check edge functions
        run: |
          for fn in supabase/functions/*/index.ts; do
            deno check "$fn"
          done
